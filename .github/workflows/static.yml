# 自动部署到 GitHub Pages
name: Deploy to Pages

on:
  push:
    branches: [main]

# 允许仓库中 Actions 创建 Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'             # 上传整个仓库
          # 排除不需要的文件夹
          # .github 和 .git 会自动排除

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
